<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Spin the Wheel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        h1 {
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

        .container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1200px;
            width: 100%;
        }

        .wheel-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .wheel-container {
            position: relative;
            width: 400px;
            height: 400px;
        }

        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,0,0,0.3);
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
        }

        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, #fff 0%, #ddd 100%);
            border-radius: 50%;
            z-index: 10;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #333;
            font-size: 12px;
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid #ff4444;
            z-index: 20;
            filter: drop-shadow(0 0 10px rgba(255,68,68,0.8));
        }

        .controls-section {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 25px;
            min-width: 350px;
            max-height: 600px;
            overflow-y: auto;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .controls-section h2 {
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .input-group input {
            padding: 10px 15px;
            border: none;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        .input-group input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .input-group input[name="name"] {
            flex: 2;
        }

        .input-group input[name="percentage"] {
            flex: 1;
            text-align: center;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-add {
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,184,148,0.4);
        }

        .btn-spin {
            background: linear-gradient(135deg, #e17055, #d63031);
            color: white;
            font-size: 18px;
            padding: 15px 50px;
            width: 100%;
            margin-top: 10px;
        }

        .btn-spin:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(225,112,85,0.4);
        }

        .btn-spin:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-remove {
            background: rgba(255,255,255,0.1);
            color: #ff6b6b;
            padding: 8px 12px;
            font-size: 12px;
        }

        .btn-remove:hover {
            background: rgba(255,107,107,0.2);
        }

        .entries-list {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .entry-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            border-left: 4px solid;
        }

        .entry-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .entry-name {
            font-weight: bold;
            font-size: 14px;
        }

        .entry-percentage {
            font-size: 12px;
            opacity: 0.7;
        }

        .total-bar {
            margin-top: 15px;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            text-align: center;
        }

        .total-bar.warning {
            background: rgba(255,193,7,0.2);
            border: 1px solid rgba(255,193,7,0.5);
        }

        .total-bar.error {
            background: rgba(244,67,54,0.2);
            border: 1px solid rgba(244,67,54,0.5);
        }

        .total-bar.success {
            background: rgba(76,175,80,0.2);
            border: 1px solid rgba(76,175,80,0.5);
        }

        .result-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .result-box {
            background: linear-gradient(135deg, #2d3436, #1a1a2e);
            padding: 50px;
            border-radius: 30px;
            text-align: center;
            border: 2px solid rgba(255,255,255,0.1);
            animation: popIn 0.5s ease;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .result-label {
            font-size: 18px;
            opacity: 0.7;
            margin-bottom: 10px;
        }

        .result-winner {
            font-size: 48px;
            font-weight: bold;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }

        .result-percentage {
            font-size: 24px;
            color: #00cec9;
        }

        .btn-close {
            margin-top: 30px;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
            padding: 12px 40px;
        }

        .wheel-label {
            position: absolute;
            font-size: 12px;
            font-weight: bold;
            color: white;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
            pointer-events: none;
            white-space: nowrap;
            transform-origin: center;
        }

        .preset-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .btn-preset {
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 12px;
            padding: 8px 15px;
        }

        .btn-preset:hover {
            background: rgba(255,255,255,0.2);
        }

        @media (max-width: 768px) {
            .wheel-container {
                width: 300px;
                height: 300px;
            }
            .controls-section {
                min-width: 300px;
            }
        }
    </style>
</head>
<body>
    <h1>🎯 Custom Spin the Wheel</h1>
    
    <div class="container">
        <div class="wheel-section">
            <div class="wheel-container">
                <div class="pointer"></div>
                <div id="wheel"></div>
                <div class="wheel-center">SPIN</div>
            </div>
            <button class="btn btn-spin" id="spinBtn" onclick="spin()">🎰 SPIN THE WHEEL</button>
        </div>

        <div class="controls-section">
            <h2>⚙️ Configure Wheel</h2>
            
            <div class="preset-buttons">
                <button class="btn btn-preset" onclick="loadPreset('war')">⚔️ War Example</button>
                <button class="btn btn-preset" onclick="loadPreset('dice')">🎲 Dice</button>
                <button class="btn btn-preset" onclick="loadPreset('clear')">🗑️ Clear</button>
            </div>

            <div class="input-group">
                <input type="text" name="name" id="newName" placeholder="Name (e.g. Win war)" maxlength="20">
                <input type="number" name="percentage" id="newPercentage" placeholder="%" min="0.1" max="100" step="0.1">
                <button class="btn btn-add" onclick="addEntry()">+ Add</button>
            </div>

            <div class="entries-list" id="entriesList"></div>

            <div class="total-bar" id="totalBar">
                Total: <span id="totalPercentage">0</span>% 
                <span id="totalStatus">(add entries to reach 100%)</span>
            </div>
        </div>
    </div>

    <div class="result-overlay" id="resultOverlay" onclick="closeResult(event)">
        <div class="result-box" onclick="event.stopPropagation()">
            <div class="result-label">🏆 The wheel has spoken!</div>
            <div class="result-winner" id="resultWinner"></div>
            <div class="result-percentage" id="resultPercentage"></div>
            <button class="btn btn-close" onclick="closeResult()">Spin Again</button>
        </div>
    </div>

    <script>
        // Color palette for wheel segments
        const colors = [
            '#e74c3c', '#3498db', '#2ecc71', '#f39c12', '#9b59b6',
            '#1abc9c', '#e67e22', '#34495e', '#16a085', '#c0392b',
            '#2980b9', '#27ae60', '#d35400', '#8e44ad', '#2c3e50',
            '#f1c40f', '#e84393', '#00b894', '#6c5ce7', '#fd79a8'
        ];

        let entries = [];
        let isSpinning = false;
        let currentRotation = 0;

        // Load the war example by default
        window.onload = () => {
            loadPreset('war');
        };

        function loadPreset(type) {
            if (type === 'war') {
                entries = [
                    { name: 'Win war', percentage: 75, color: colors[0] },
                    { name: 'Draw', percentage: 10, color: colors[1] },
                    { name: 'Lose war', percentage: 5, color: colors[2] }
                ];
            } else if (type === 'dice') {
                entries = [
                    { name: '1', percentage: 16.67, color: colors[0] },
                    { name: '2', percentage: 16.67, color: colors[1] },
                    { name: '3', percentage: 16.66, color: colors[2] },
                    { name: '4', percentage: 16.67, color: colors[3] },
                    { name: '5', percentage: 16.67, color: colors[4] },
                    { name: '6', percentage: 16.66, color: colors[5] }
                ];
            } else if (type === 'clear') {
                entries = [];
            }
            render();
        }

        function addEntry() {
            const nameInput = document.getElementById('newName');
            const percentageInput = document.getElementById('newPercentage');
            
            const name = nameInput.value.trim();
            const percentage = parseFloat(percentageInput.value);

            if (!name) {
                alert('Please enter a name!');
                return;
            }
            if (isNaN(percentage) || percentage <= 0) {
                alert('Please enter a valid percentage!');
                return;
            }

            const total = entries.reduce((sum, e) => sum + e.percentage, 0);
            if (total + percentage > 100) {
                alert(`Total would exceed 100%! Current total: ${total.toFixed(1)}%`);
                return;
            }

            entries.push({
                name: name,
                percentage: percentage,
                color: colors[entries.length % colors.length]
            });

            nameInput.value = '';
            percentageInput.value = '';
            nameInput.focus();
            render();
        }

        function removeEntry(index) {
            entries.splice(index, 1);
            // Reassign colors to keep them consistent
            entries.forEach((entry, i) => {
                entry.color = colors[i % colors.length];
            });
            render();
        }

        function render() {
            renderList();
            renderWheel();
            updateTotal();
        }

        function renderList() {
            const list = document.getElementById('entriesList');
            list.innerHTML = '';

            entries.forEach((entry, index) => {
                const div = document.createElement('div');
                div.className = 'entry-item';
                div.style.borderLeftColor = entry.color;
                div.innerHTML = `
                    <div class="entry-info">
                        <div class="entry-name">${entry.name}</div>
                        <div class="entry-percentage">${entry.percentage}% chance</div>
                    </div>
                    <button class="btn btn-remove" onclick="removeEntry(${index})">✕</button>
                `;
                list.appendChild(div);
            });
        }

        function renderWheel() {
            const wheel = document.getElementById('wheel');
            
            if (entries.length === 0) {
                wheel.innerHTML = '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.3);">Add entries to spin</div>';
                return;
            }

            // Create conic gradient for the wheel
            let gradientStops = [];
            let currentAngle = 0;
            
            entries.forEach(entry => {
                const angleSize = (entry.percentage / 100) * 360;
                const startAngle = currentAngle;
                const endAngle = currentAngle + angleSize;
                gradientStops.push(`${entry.color} ${startAngle}deg ${endAngle}deg`);
                currentAngle = endAngle;
            });

            wheel.style.background = `conic-gradient(${gradientStops.join(', ')})`;

            // Add labels
            wheel.innerHTML = '';
            currentAngle = 0;
            
            entries.forEach(entry => {
                const angleSize = (entry.percentage / 100) * 360;
                const midAngle = currentAngle + angleSize / 2;
                
                // Position label at 70% radius from center
                const radius = 35; // percentage of container
                const rad = (midAngle - 90) * (Math.PI / 180);
                const x = 50 + radius * Math.cos(rad);
                const y = 50 + radius * Math.sin(rad);

                const label = document.createElement('div');
                label.className = 'wheel-label';
                label.textContent = entry.name;
                label.style.left = x + '%';
                label.style.top = y + '%';
                label.style.transform = `translate(-50%, -50%) rotate(${midAngle}deg)`;
                
                wheel.appendChild(label);
                currentAngle += angleSize;
            });
        }

        function updateTotal() {
            const total = entries.reduce((sum, e) => sum + e.percentage, 0);
            const totalEl = document.getElementById('totalPercentage');
            const statusEl = document.getElementById('totalStatus');
            const bar = document.getElementById('totalBar');

            totalEl.textContent = total.toFixed(1);

            bar.className = 'total-bar';
            if (Math.abs(total - 100) < 0.1) {
                bar.classList.add('success');
                statusEl.textContent = '✅ Ready to spin!';
                document.getElementById('spinBtn').disabled = false;
            } else if (total > 100) {
                bar.classList.add('error');
                statusEl.textContent = '❌ Over 100%! Remove some entries.';
                document.getElementById('spinBtn').disabled = true;
            } else {
                bar.classList.add('warning');
                statusEl.textContent = `⚠️ Need ${(100 - total).toFixed(1)}% more`;
                document.getElementById('spinBtn').disabled = true;
            }
        }

        function spin() {
            if (isSpinning || entries.length === 0) return;
            
            const total = entries.reduce((sum, e) => sum + e.percentage, 0);
            if (Math.abs(total - 100) > 0.1) {
                alert('Total must equal 100% before spinning!');
                return;
            }

            isSpinning = true;
            document.getElementById('spinBtn').disabled = true;

            // Determine winner based on percentage weights
            const random = Math.random() * 100;
            let cumulative = 0;
            let winnerIndex = 0;
            let winnerAngle = 0;
            let currentAngle = 0;

            for (let i = 0; i < entries.length; i++) {
                cumulative += entries[i].percentage;
                if (random <= cumulative) {
                    winnerIndex = i;
                    // Calculate the angle range for this segment
                    const segmentStart = currentAngle;
                    const segmentSize = (entries[i].percentage / 100) * 360;
                    // Pick a random point within the segment for visual variety
                    const randomOffset = Math.random() * segmentSize * 0.8 + segmentSize * 0.1;
                    winnerAngle = segmentStart + randomOffset;
                    break;
                }
                currentAngle += (entries[i].percentage / 100) * 360;
            }

            const winner = entries[winnerIndex];

            // Calculate rotation: we want the winner segment to end up at the top (270 degrees / -90 degrees from standard)
            // The pointer is at top (0 degrees in visual terms, but we rotate the wheel clockwise)
            // We need to rotate so that winnerAngle ends up at -90 degrees (top)
            const extraSpins = 5 + Math.floor(Math.random() * 3); // 5-7 full spins
            const targetRotation = currentRotation + (extraSpins * 360) + (360 - winnerAngle) + 90;

            const wheel = document.getElementById('wheel');
            wheel.style.transform = `rotate(${targetRotation}deg)`;
            currentRotation = targetRotation;

            setTimeout(() => {
                showResult(winner);
                isSpinning = false;
                document.getElementById('spinBtn').disabled = false;
            }, 4000);
        }

        function showResult(winner) {
            document.getElementById('resultWinner').textContent = winner.name;
            document.getElementById('resultPercentage').textContent = `${winner.percentage}% chance`;
            document.getElementById('resultOverlay').style.display = 'flex';
        }

        function closeResult(event) {
            if (event && event.target !== event.currentTarget) return;
            document.getElementById('resultOverlay').style.display = 'none';
        }

        // Allow Enter key to add entries
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && (e.target.id === 'newName' || e.target.id === 'newPercentage')) {
                addEntry();
            }
        });
    </script>
</body>
</html>
